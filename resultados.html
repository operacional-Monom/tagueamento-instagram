<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados - Tagueamento</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');
        
        :root {
            --bg-color: #0f1016;
            --surface-color: #1a1c23;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top, #1a1c23 0%, var(--bg-color) 70%);
            padding: 2rem;
        }

        .container {
            background-color: var(--surface-color);
            padding: 2rem 1.5rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 1000px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-indicator {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-muted);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }

        th, td {
            text-align: left;
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }
        
        td:first-child { 
            max-width: 140px; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap;
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:hover {
            background-color: rgba(255,255,255,0.02);
        }

        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 0.4rem;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            white-space: nowrap;
        }

        .b-segue { background-color: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .b-nao-segue { background-color: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .b-erro { background-color: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }

        .b-direita { background-color: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
        .b-esquerda { background-color: rgba(220, 38, 38, 0.2); color: #f87171; border: 1px solid rgba(220, 38, 38, 0.3); }
        .b-centro { background-color: rgba(168, 85, 247, 0.2); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.3); }
        .b-indefinido { background-color: rgba(148, 163, 184, 0.2); color: #cbd5e1; border: 1px solid rgba(148, 163, 184, 0.3); }
        
        .b-feminino { background-color: #fca5a5; color: #7f1d1d; border: 1px solid #f87171; }
        .b-masculino { background-color: #bae6fd; color: #075985; border: 1px solid #7dd3fc; }
        .b-nao-ident { background-color: #fde68a; color: #92400e; border: 1px solid #fcd34d; }
        .b-empresa { background-color: #e5e7eb; color: #374151; border: 1px solid #d1d5db; }

        .b-aguarde { background-color: rgba(255, 255, 255, 0.05); color: #94a3b8; border: 1px dashed rgba(255, 255, 255, 0.2); }

        .acoes {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        button {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-primary:active { transform: scale(0.98); }

        .btn-outline {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        .btn-outline:hover { background-color: rgba(99, 102, 241, 0.1); }
        .btn-outline:active { transform: scale(0.98); }

        .loader {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .skeleton {
            width: 100%;
            height: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
            margin-bottom: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        
    </style>
</head>
<body>

    <div class="container">
        <div class="status-header">
            <div>
                <h1>Acompanhar Análise</h1>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.2rem;" id="jobIdText">Protocolo: Carregando...</p>
            </div>
            <div class="progress-indicator" id="progressStatus">
                <span class="loader"></span> Buscando dados
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Conta Verificada</th>
                    <th>Status: Segue o Alvo?</th>
                    <th>Tendência Política</th>
                    <th>Gênero/Tipo</th>
                    <th>Localização</th>
                </tr>
            </thead>
            <tbody id="listaResultados">
                <!-- Skeletons -->
                <tr><td colspan="5"><div class="skeleton"></div></td></tr>
                <tr><td colspan="5"><div class="skeleton"></div></td></tr>
            </tbody>
        </table>

        <div class="acoes" style="display: none;" id="botoesTabela">
            <button class="btn-outline" onclick="copiarApenasClassificacoes()">Copiar Coluna (Classificações)</button>
            <button class="btn-primary" onclick="copiarTudo()">Copiar Tabela Inteira (Excel)</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('id');

        const jobIdText = document.getElementById('jobIdText');
        const progressStatus = document.getElementById('progressStatus');
        const listaResultados = document.getElementById('listaResultados');
        const botoesTabela = document.getElementById('botoesTabela');

        let intervalCheck = null;
        let jobAtual = null;

        if (!jobId) {
            jobIdText.innerText = "Erro: Nenhum ID de protocolo fornecido na URL.";
            progressStatus.innerText = "Parado";
            listaResultados.innerHTML = "<tr><td colspan='2'>Volte na tela anterior e faça uma análise.</td></tr>";
        } else {
            jobIdText.innerText = `Protocolo: ${jobId}`;
            iniciarAcompanhamento();
        }

        function iniciarAcompanhamento() {
            intervalCheck = setInterval(checarStatus, 3000);
            checarStatus(); // chamativa inicial
        }

        async function checarStatus() {
            try {
                const response = await fetch(`http://localhost:3000/api/status/${jobId}`);
                if (!response.ok) return;

                jobAtual = await response.json();
                renderizarTabela(jobAtual);

                if (jobAtual.status === "CONCLUIDO") {
                    clearInterval(intervalCheck);
                    progressStatus.style.color = "var(--success)";
                    progressStatus.innerText = `✅ Concluído (${jobAtual.totalContas}/${jobAtual.totalContas})`;
                    botoesTabela.style.display = "flex";
                } else if (jobAtual.status === "ERRO_INTERNO") {
                    clearInterval(intervalCheck);
                    progressStatus.style.color = "var(--error)";
                    progressStatus.innerText = `❌ Falha na Execução`;
                } else {
                    progressStatus.innerHTML = `<span class="loader"></span> Processando (${jobAtual.progresso}/${jobAtual.totalContas})`;
                }

            } catch (error) {
                console.log("Aguardando servidor...");
            }
        }

        // Parse padrão gerado pelo Puppeteer: "[ TIPO_TEXTO ] @usuario"
        function parseResultado(textoCru) {
            const regex = /\[(.*?)\] (.*)/;
            const match = textoCru.match(regex);
            if (match) {
                return { class: match[1].trim(), user: match[2].trim() };
            }
            return { class: "DESCONHECIDO", user: textoCru };
        }

        function getBadgeClass(classif) {
            if (classif === "SEGUE") return "b-segue";
            if (classif === "NÃO SEGUE") return "b-nao-segue";
            if (classif === "DIREITA") return "b-direita";
            if (classif === "ESQUERDA") return "b-esquerda";
            if (classif === "CENTRO") return "b-centro";
            if (classif === "INDEFINIDO") return "b-indefinido";
            
            if (classif === "FEMININO") return "b-feminino";
            if (classif === "MASCULINO") return "b-masculino";
            if (classif === "Não identificado") return "b-nao-ident";
            if (classif === "Empresa") return "b-empresa";

            if (classif === "AGUARDANDO" || classif === "..." || classif === "-") return "b-aguarde";
            if (classif === "INEXISTENTE" || classif === "PRIVADA" || classif === "ERRO") return "b-erro";
            
            // Fallback para localização ou textos livres
            return "b-indefinido";
        }

        function renderizarTabela(job) {
            if (!job.resultados || job.resultados.length === 0) {
                if (job.status === "PROCESSANDO" && job.progresso === 0) {
                    listaResultados.innerHTML = `<tr><td colspan="2" style="text-align:center; color: #94a3b8;"><span class="loader"></span> O robô está abrindo o Instagram...</td></tr>`;
                }
                return;
            }

            listaResultados.innerHTML = "";
            let html = "";
            job.resultados.forEach(res => {
                // Suporte condicional se for objeto novo ou string antiga
                let user = "", cSegue = "", cPol = "", cGen = "", cLoc = "";
                if (typeof res === "object") {
                    user = res.user;
                    cSegue = res.classSegue;
                    cPol = res.classPolitica;
                    cGen = res.classGenero || "-";
                    cLoc = res.localizacao || "-";
                } else {
                    const parsed = parseResultado(res);
                    user = parsed.user;
                    cSegue = parsed.class;
                    cPol = "-";
                    cGen = "-";
                    cLoc = "-";
                }

                html += `
                    <tr>
                        <td style="font-weight: 500;">${user}</td>
                        <td><span class="badge ${getBadgeClass(cSegue)}">${cSegue}</span></td>
                        <td><span class="badge ${getBadgeClass(cPol)}">${cPol}</span></td>
                        <td><span class="badge ${getBadgeClass(cGen)}">${cGen}</span></td>
                        <td><span class="badge ${getBadgeClass(cLoc)}">${cLoc}</span></td>
                    </tr>
                `;
            });
            listaResultados.innerHTML = html;
        }

        function copiarApenasClassificacoes() {
            if (!jobAtual || !jobAtual.resultados) return;
            const classificacoes = jobAtual.resultados.map(res => {
                if (typeof res === "object") return `${res.classSegue}\t${res.classPolitica}\t${res.classGenero || "-"}\t${res.localizacao || "-"}`;
                return parseResultado(res).class;
            }).join("\n");

            navigator.clipboard.writeText(classificacoes);
            alert("Colunas de Classificações copiadas (Segue | Política | Gênero | Local)! Pode colar no Excel.");
        }

        function copiarTudo() {
            if (!jobAtual || !jobAtual.resultados) return;
            const tabelaCompleta = jobAtual.resultados.map(res => {
                if (typeof res === "object") return `${res.user}\t${res.classSegue}\t${res.classPolitica}\t${res.classGenero || "-"}\t${res.localizacao || "-"}`;
                const item = parseResultado(res);
                return `${item.user}\t${item.class}\t-\t-\t-`; 
            }).join("\n");

            navigator.clipboard.writeText(tabelaCompleta);
            alert("Tabela completa copiada! Cole no Excel (1ª: Perfil / 2ª: Segue / 3ª: Política / 4ª: Gênero / 5ª: Local)");
        }

    </script>
</body>
</html>
